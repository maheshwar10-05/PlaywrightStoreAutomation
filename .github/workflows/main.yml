name: Playwright Pytest CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 20 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: playwrightTestingPractice
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run Tests
        working-directory: playwrightTestingPractice
        run: pytest -n 6 --alluredir=reports/allure-results
        continue-on-error: true

      # ✅ Install Java
      - name: Install Java
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre

      # ✅ Install Allure CLI (Stable)
      - name: Install Allure
        if: always()
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxvf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # ✅ Generate Report
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate playwrightTestingPractice/reports/allure-results \
          -o playwrightTestingPractice/reports/allure-report --clean

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: playwrightTestingPractice/reports/allure-report

      - name: Upload Playwright Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: playwrightTestingPractice/test-results/